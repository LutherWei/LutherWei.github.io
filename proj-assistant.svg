<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Conversational debugging assistant">
  <defs>
    <linearGradient id="asbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a0f26"/>
      <stop offset="1" stop-color="#241a52"/>
    </linearGradient>
    <radialGradient id="asglow" cx="0.75" cy="0.7" r="0.8">
      <stop offset="0" stop-color="#9a6dff" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#9a6dff" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#asbg)"/>
  <rect width="640" height="360" fill="url(#asglow)"/>

  <!-- incoming bubble (log/code) -->
  <g transform="translate(70 70)">
    <rect x="0" y="0" width="230" height="120" rx="18" fill="#141a3d" stroke="#3a4488" stroke-width="1.5"/>
    <path d="M28 120 l0 26 l26 -26 z" fill="#141a3d"/>
    <text x="20" y="34" fill="#ff8a8a" font-family="monospace" font-size="15" font-weight="700">ERROR log</text>
    <rect x="20" y="48" width="180" height="9" rx="4" fill="#5a67b8" opacity="0.7"/>
    <rect x="20" y="66" width="150" height="9" rx="4" fill="#5a67b8" opacity="0.5"/>
    <rect x="20" y="84" width="190" height="9" rx="4" fill="#5a67b8" opacity="0.6"/>
  </g>

  <!-- reply bubble (multi-stage) -->
  <g transform="translate(350 150)">
    <rect x="0" y="0" width="230" height="130" rx="18" fill="#6d8bff" stroke="#a9bcff" stroke-width="1.5"/>
    <path d="M204 130 l0 26 l-26 -26 z" fill="#6d8bff"/>
    <text x="20" y="34" fill="#ffffff" font-family="monospace" font-size="15" font-weight="700">✔ FIX · step 1/3</text>
    <rect x="20" y="50" width="190" height="9" rx="4" fill="#ffffff" opacity="0.85"/>
    <rect x="20" y="68" width="160" height="9" rx="4" fill="#ffffff" opacity="0.7"/>
    <rect x="20" y="86" width="180" height="9" rx="4" fill="#ffffff" opacity="0.8"/>
    <rect x="20" y="104" width="120" height="9" rx="4" fill="#ffffff" opacity="0.6"/>
  </g>

  <text x="40" y="335" fill="#b8a9ff" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700" letter-spacing="1">DEBUG ASSISTANT · RAG</text>
</svg>
