<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="AI fencing coach">
  <defs>
    <linearGradient id="fcbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a0713"/>
      <stop offset="1" stop-color="#6b1030"/>
    </linearGradient>
    <radialGradient id="fcglow" cx="0.5" cy="0.4" r="0.7">
      <stop offset="0" stop-color="#ff6b8b" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff6b8b" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#fcbg)"/>
  <rect width="640" height="360" fill="url(#fcglow)"/>

  <!-- pose keypoints of a lunging fencer -->
  <g stroke="#ff9fb2" stroke-width="4" stroke-linecap="round" fill="none" opacity="0.95">
    <!-- back leg -->
    <line x1="150" y1="250" x2="220" y2="200"/>
    <!-- torso -->
    <line x1="220" y1="200" x2="300" y2="150"/>
    <!-- front leg lunge -->
    <line x1="220" y1="200" x2="300" y2="270"/>
    <line x1="300" y1="270" x2="380" y2="280"/>
    <!-- sword arm -->
    <line x1="300" y1="150" x2="460" y2="130"/>
    <!-- head to shoulder -->
    <line x1="300" y1="150" x2="290" y2="115"/>
  </g>
  <!-- blade -->
  <line x1="460" y1="130" x2="560" y2="118" stroke="#ffd5dd" stroke-width="2.5"/>
  <!-- keypoints -->
  <g fill="#ffffff">
    <circle cx="150" cy="250" r="6"/><circle cx="220" cy="200" r="6"/>
    <circle cx="300" cy="150" r="6"/><circle cx="300" cy="270" r="6"/>
    <circle cx="380" cy="280" r="6"/><circle cx="460" cy="130" r="6"/>
    <circle cx="290" cy="115" r="10"/>
  </g>

  <!-- camera framing brackets -->
  <g stroke="#ffb3c1" stroke-width="3" fill="none" opacity="0.7">
    <path d="M70 70 h34 M70 70 v34"/>
    <path d="M570 70 h-34 M570 70 v34"/>
    <path d="M70 300 h34 M70 300 v-34"/>
    <path d="M570 300 h-34 M570 300 v-34"/>
  </g>

  <text x="40" y="340" fill="#ffb3c1" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700" letter-spacing="1">AI FENCING COACH · CV</text>
</svg>
