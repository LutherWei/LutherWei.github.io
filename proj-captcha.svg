<svg viewBox="0 0 640 360" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Adversarial attack on CAPTCHA solvers">
  <defs>
    <linearGradient id="cabg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2a1e04"/>
      <stop offset="1" stop-color="#6b4e0c"/>
    </linearGradient>
    <radialGradient id="caglow" cx="0.5" cy="0.35" r="0.75">
      <stop offset="0" stop-color="#f4b740" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#f4b740" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="640" height="360" fill="url(#cabg)"/>
  <rect width="640" height="360" fill="url(#caglow)"/>

  <!-- captcha panel -->
  <rect x="120" y="110" width="400" height="140" rx="16" fill="#1c1503" stroke="#8a6c1a" stroke-width="1.5"/>

  <!-- distorted CAPTCHA text -->
  <g font-family="Georgia,serif" font-weight="700" font-size="76" fill="#ffe08a">
    <text x="150" y="205" transform="rotate(-12 175 190)">A</text>
    <text x="215" y="205" transform="rotate(8 240 190)">7</text>
    <text x="280" y="205" transform="rotate(-6 305 190)">k</text>
    <text x="345" y="205" transform="rotate(14 370 190)">Q</text>
    <text x="415" y="205" transform="rotate(-9 440 190)">3</text>
  </g>
  <!-- adversarial noise -->
  <g fill="#f4b740" opacity="0.5">
    <circle cx="160" cy="140" r="3"/><circle cx="240" cy="230" r="3"/><circle cx="300" cy="150" r="3"/>
    <circle cx="360" cy="235" r="3"/><circle cx="430" cy="145" r="3"/><circle cx="480" cy="215" r="3"/>
    <circle cx="200" cy="200" r="2"/><circle cx="330" cy="205" r="2"/><circle cx="400" cy="180" r="2"/>
  </g>
  <path d="M120 180 q100 -40 200 0 t200 0" stroke="#f4b740" stroke-width="2" fill="none" opacity="0.5"/>

  <!-- broken solver indicator -->
  <g transform="translate(500 250)">
    <circle cx="0" cy="0" r="26" fill="#3a2a06" stroke="#f4b740" stroke-width="2"/>
    <path d="M-10 -10 L10 10 M10 -10 L-10 10" stroke="#ff6b6b" stroke-width="4" stroke-linecap="round"/>
  </g>

  <text x="40" y="335" fill="#ffd06b" font-family="-apple-system,Segoe UI,sans-serif" font-size="20" font-weight="700" letter-spacing="1">ADVERSARIAL ATTACK · ML</text>
</svg>
